<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SheynEQ Demo</title>
    <style>
      :root {
        color: #eef4ff;
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        align-items: center;
        background:
          radial-gradient(circle at 24% 12%, rgba(124, 247, 212, 0.18), transparent 32%),
          linear-gradient(145deg, #080b12, #101827);
        display: grid;
        min-block-size: 100vh;
        margin: 0;
        padding: 24px;
      }

      main {
        inline-size: min(760px, 100%);
      }

      h1 {
        font-size: 28px;
        margin: 0 0 8px;
      }

      p {
        color: #93a0b8;
        margin: 0 0 22px;
      }

      .panel {
        background: rgba(16, 21, 33, 0.72);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 8px;
        padding: 18px;
        backdrop-filter: blur(20px);
      }

      audio,
      video {
        display: block;
        inline-size: 100%;
        margin-block-start: 16px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>SheynEQ Demo</h1>
      <p>Load this page through the built extension, press play, then use the popup to change EQ and effects settings.</p>
      <section class="panel">
        <audio controls loop src="demo-tone.wav"></audio>
      </section>
    </main>
  </body>
</html>
